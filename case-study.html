<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Case Study | Greenpoint</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="gp">

  <nav class="gp-header">
    <a href="index.html#top" class="gp-header-logo">
      <img src="https://greenpointmedia.com.au/wp-content/uploads/2022/06/d.navlogo.svg" alt="Greenpoint">
    </a>
    <button class="gp-hamburger" id="gp-hamburger" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <div class="gp-header-nav" id="gp-nav">
      <div class="gp-services-dropdown">
        <button class="gp-header-link" type="button" id="gp-services-btn" aria-expanded="false" aria-controls="gp-services-menu">Services</button>
        <div class="gp-services-menu" id="gp-services-menu">
          <a href="index.html#pr">PR</a>
          <a href="index.html#content-social">Content &amp; Social Media</a>
          <a href="index.html#influencer">Influencer &amp; Creator Marketing</a>
          <a href="index.html#events">Events &amp; Activation</a>
          <a href="index.html#partnerships">Brand Partnerships</a>
          <a href="index.html#crisis">Crisis Communications</a>
        </div>
      </div>
      <a href="work.html" class="gp-header-link">Work</a>
      <a href="mailto:hello@greenpointmedia.com.au" class="gp-header-contact">Contact Us</a>
    </div>
  </nav>

  <div class="gp-header-spacer"></div>

  <main id="cs-root" class="bg-light"></main>

</div>

<script>
function escapeHTML(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

(async function () {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');

  if (!slug) {
    document.getElementById('cs-root').innerHTML = '<p style="padding:80px 60px">No case study specified.</p>';
    return;
  }

  let data;
  try {
    if (slug.startsWith('preview:')) {
      const previewSlug = slug.replace('preview:', '');
      if (!/^[a-z0-9-]+$/.test(previewSlug)) throw new Error('Invalid slug');
      const key = 'gp-preview-' + previewSlug;
      const stored = localStorage.getItem(key);
      if (!stored) throw new Error('No preview data');
      data = JSON.parse(stored);
    } else {
      if (!/^[a-z0-9-]+$/.test(slug)) throw new Error('Invalid slug');
      const res = await fetch('content/case-studies/' + slug + '.json');
      if (!res.ok) throw new Error('Not found');
      data = await res.json();
    }
  } catch (e) {
    document.getElementById('cs-root').innerHTML = '<p style="padding:80px 60px">Case study not found.</p>';
    return;
  }

  document.title = escapeHTML(data.title) + ' | Greenpoint';

  const html = (data.blocks || []).map(renderBlock).join('');
  document.getElementById('cs-root').innerHTML = html;
}());

function renderBlock(block) {
  switch (block.type) {

    case 'hero':
      return `<div class="cs-hero">
        <img src="${escapeHTML(block.src)}" alt="${escapeHTML(block.alt || '')}">
      </div>`;

    case 'intro':
      return `<div class="cs-intro">
        <h1 class="cs-intro-heading t-upper f300">${escapeHTML(block.heading)}</h1>
        <div class="cs-intro-body">
          ${(block.body || '').split('\n\n').map(p => `<p>${escapeHTML(p)}</p>`).join('')}
        </div>
      </div>`;

    case 'image':
      return `<div class="cs-image">
        <img src="${escapeHTML(block.src)}" alt="${escapeHTML(block.alt || '')}">
      </div>`;

    case 'section':
      return `<div class="cs-section">
        <div class="cs-section-left">
          <p class="cs-section-num t-upper f300">${escapeHTML(block.number)} &ndash; ${escapeHTML(block.heading)}</p>
          <ul class="cs-section-list">
            ${(block.list || []).map(item => `<li>${escapeHTML(item)}</li>`).join('')}
          </ul>
        </div>
        <div class="cs-section-right">
          ${(block.body || '').split('\n\n').map(p => `<p>${escapeHTML(p)}</p>`).join('')}
        </div>
      </div>`;

    case 'logos':
      return `<div class="cs-logos">
        <p class="cs-section-num t-upper f300">${escapeHTML(block.number)} &ndash; ${escapeHTML(block.heading)}</p>
        <div class="cs-logos-row">
          ${(block.items || []).map(logo => `<img src="${escapeHTML(logo.src)}" alt="${escapeHTML(logo.name)}">`).join('')}
        </div>
      </div>`;

    default:
      return '';
  }
}
</script>
<script src="nav.js"></script>
</body>
</html>
