<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Work | Greenpoint</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="gp">

  <nav class="gp-header">
    <a href="index.html#top" class="gp-header-logo">
      <img src="https://greenpointmedia.com.au/wp-content/uploads/2022/06/d.navlogo.svg" alt="Greenpoint">
    </a>
    <button class="gp-hamburger" id="gp-hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>

    <div class="gp-header-nav" id="gp-nav">
      <div class="gp-services-dropdown">
        <button class="gp-header-link" type="button" id="gp-services-btn">Services</button>
        <div class="gp-services-menu" id="gp-services-menu">
          <a href="index.html#pr">PR</a>
          <a href="index.html#content-social">Content &amp; Social Media</a>
          <a href="index.html#influencer">Influencer &amp; Creator Marketing</a>
          <a href="index.html#events">Events &amp; Activation</a>
          <a href="index.html#partnerships">Brand Partnerships</a>
          <a href="index.html#crisis">Crisis Communications</a>
        </div>
      </div>
      <a href="work.html" class="gp-header-link">Work</a>
      <a href="mailto:hello@greenpointmedia.com.au" class="gp-header-contact">Contact Us</a>
    </div>
  </nav>

  <div class="gp-header-spacer"></div>

  <section class="work-page bg-light">
    <h1 class="work-title t-dark t-upper f300">Work</h1>
    <div class="work-grid" id="work-grid"></div>
  </section>

</div>

<script>
(async function () {
  const grid = document.getElementById('work-grid');

  let studies;
  try {
    const res = await fetch('content/case-studies/index.json');
    if (!res.ok) throw new Error();
    studies = await res.json();
  } catch (e) {
    grid.innerHTML = '<p style="opacity:0.4;font-size:14px">No case studies found.</p>';
    return;
  }

  grid.innerHTML = studies.map(s => `
    <article class="work-card">
      <a href="case-study.html?slug=${s.slug}">
        <div class="work-card-img">
          <img src="${s.thumbnail || ''}" alt="${s.title}">
        </div>
        <span class="work-card-category">${s.category || ''}</span>
        <p class="work-card-desc">${s.title}</p>
        <span class="work-card-tags">${(s.tags || []).join(', ')}</span>
      </a>
    </article>
  `).join('');
}());
</script>
<script>
(function(){
  const burger = document.getElementById('gp-hamburger');
  const nav = document.getElementById('gp-nav');
  const servicesBtn = document.getElementById('gp-services-btn');
  const servicesMenu = document.getElementById('gp-services-menu');
  burger.addEventListener('click', function(){
    burger.classList.toggle('open');
    nav.classList.toggle('open');
    document.body.style.overflow = nav.classList.contains('open') ? 'hidden' : '';
  });
  servicesBtn.addEventListener('click', function(e){
    if(window.innerWidth <= 768){ e.stopPropagation(); servicesMenu.classList.toggle('open'); }
  });
  nav.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click', function(){
      burger.classList.remove('open');
      nav.classList.remove('open');
      document.body.style.overflow = '';
    });
  });
}());
</script>
</body>
</html>
