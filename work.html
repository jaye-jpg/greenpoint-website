<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Work | Greenpoint</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="gp">

  <nav class="gp-header">
    <a href="index.html#top" class="gp-header-logo">
      <img src="https://greenpointmedia.com.au/wp-content/uploads/2022/06/d.navlogo.svg" alt="Greenpoint">
    </a>
    <button class="gp-hamburger" id="gp-hamburger" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <div class="gp-header-nav" id="gp-nav">
      <div class="gp-services-dropdown">
        <button class="gp-header-link" type="button" id="gp-services-btn" aria-expanded="false" aria-controls="gp-services-menu">Services</button>
        <div class="gp-services-menu" id="gp-services-menu">
          <a href="index.html#pr">PR</a>
          <a href="index.html#content-social">Content &amp; Social Media</a>
          <a href="index.html#influencer">Influencer &amp; Creator Marketing</a>
          <a href="index.html#events">Events &amp; Activation</a>
          <a href="index.html#partnerships">Brand Partnerships</a>
          <a href="index.html#crisis">Crisis Communications</a>
        </div>
      </div>
      <a href="work.html" class="gp-header-link">Work</a>
      <a href="mailto:hello@greenpointmedia.com.au" class="gp-header-contact">Contact Us</a>
    </div>
  </nav>

  <div class="gp-header-spacer"></div>

  <section class="work-page bg-light">
    <h1 class="work-title t-dark t-upper f300">Work</h1>
    <div class="work-grid" id="work-grid"></div>
  </section>

</div>

<script>
function escapeHTML(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

(async function () {
  const grid = document.getElementById('work-grid');

  let studies;
  try {
    const res = await fetch('content/case-studies/index.json');
    if (!res.ok) throw new Error('Failed to load index');
    studies = await res.json();
  } catch (e) {
    grid.innerHTML = '<p style="opacity:0.4;font-size:14px">No case studies found.</p>';
    return;
  }

  grid.innerHTML = studies.map(s => `
    <article class="work-card">
      <a href="case-study.html?slug=${escapeHTML(s.slug)}">
        <div class="work-card-img">
          <img src="${escapeHTML(s.thumbnail || '')}" alt="${escapeHTML(s.title)}">
        </div>
        <span class="work-card-category">${escapeHTML(s.category || '')}</span>
        <h3 class="work-card-desc">${escapeHTML(s.title)}</h3>
        <span class="work-card-tags">${escapeHTML((s.tags || []).join(', '))}</span>
      </a>
    </article>
  `).join('');
}());
</script>
<script src="nav.js"></script>
</body>
</html>
